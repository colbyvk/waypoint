# Waypoint house IaC rules — AWS CDK in TypeScript (infrastructure-as-code; spec §6, §13)
# These are PROXY detectors: recall-oriented beacons on risky cloud-config shapes
# expressed as CDK TypeScript. An agent verifies whether the exposure is real.
# TS CDK constructs: `new s3.Bucket(this, "id", { ...props })`. languages:[typescript]
# also covers .ts files. Trivy covers the Terraform/Dockerfile side.
rules:
  # ------------------------------------------------------------------ SECURITY
  - id: waypoint-ts-cdk-s3-no-encryption
    languages: [typescript]
    severity: WARNING
    message: >
      CDK S3 bucket created without an explicit `encryption:` property, so it may
      fall back to unmanaged/SSE defaults. Agent: confirm this bucket stores no
      sensitive data unencrypted at rest, or set BucketEncryption.S3_MANAGED/KMS.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "S3 bucket constructed with no encryption: prop — is data unencrypted at rest?"
    patterns:
      - pattern: new s3.Bucket($A, $B, {...})
      - pattern-not: "new s3.Bucket($A, $B, {..., encryption: $E, ...})"
      - pattern-not: "new s3.Bucket($A, $B, {..., encryptionKey: $K, ...})"

  - id: waypoint-ts-cdk-s3-public
    languages: [typescript]
    severity: ERROR
    message: >
      CDK S3 bucket is exposed to the public — `publicReadAccess: true` and/or
      block-public-access disabled. Agent: confirm whether this bucket is meant to
      be world-readable, or restore BlockPublicAccess.BLOCK_ALL.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "S3 bucket with publicReadAccess:true / disabled BPA — intended public exposure?"
    patterns:
      - pattern-either:
          - pattern: "new s3.Bucket($A, $B, {..., publicReadAccess: true, ...})"
          - pattern: "new s3.Bucket($A, $B, {..., blockPublicAccess: s3.BlockPublicAccess.BLOCK_ACLS, ...})"

  - id: waypoint-ts-cdk-iam-wildcard
    languages: [typescript]
    severity: ERROR
    message: >
      CDK IAM PolicyStatement grants wildcard actions (and/or resources). Agent:
      does this `*` policy violate least-privilege — scope actions and resources
      to the minimum the principal needs.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "IAM PolicyStatement with actions:['*'] / resources:['*'] — over-broad grant?"
    patterns:
      - pattern-either:
          - pattern: "new iam.PolicyStatement({..., actions: [\"*\"], ...})"
          - pattern: "new iam.PolicyStatement({..., resources: [\"*\"], ...})"

  - id: waypoint-ts-cdk-sg-open-world
    languages: [typescript]
    severity: ERROR
    message: >
      CDK security group / connections opened to the whole internet
      (`ec2.Peer.anyIpv4()` / `anyIpv6()`). Agent: confirm this ingress should be
      world-reachable, or restrict the CIDR to known ranges.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "security group ingress from Peer.anyIpv4/anyIpv6 — open to the world?"
    patterns:
      - pattern-either:
          - pattern: $X.addIngressRule(ec2.Peer.anyIpv4(), ...)
          - pattern: $X.addIngressRule(ec2.Peer.anyIpv6(), ...)
          - pattern: $X.connections.allowFrom(ec2.Peer.anyIpv4(), ...)
          - pattern: $X.connections.allowFrom(ec2.Peer.anyIpv6(), ...)
          - pattern: $X.connections.allowFromAnyIpv4(...)

  - id: waypoint-ts-cdk-db-no-encryption
    languages: [typescript]
    severity: WARNING
    message: >
      CDK RDS/Redshift database created without `storageEncrypted: true`. Agent:
      confirm storage-at-rest encryption requirements for this data store and set
      storageEncrypted: true.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "RDS/Redshift built with no storageEncrypted:true — unencrypted DB at rest?"
    patterns:
      - pattern-either:
          - pattern: new rds.DatabaseInstance($A, $B, {...})
          - pattern: new rds.DatabaseCluster($A, $B, {...})
      - pattern-not: "new rds.DatabaseInstance($A, $B, {..., storageEncrypted: true, ...})"
      - pattern-not: "new rds.DatabaseCluster($A, $B, {..., storageEncrypted: true, ...})"

  - id: waypoint-ts-cdk-db-public
    languages: [typescript]
    severity: ERROR
    message: >
      CDK database marked `publiclyAccessible: true`, giving it a public endpoint.
      Agent: confirm this database must be reachable from the internet, or set
      publiclyAccessible: false and keep it in private subnets.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "DB construct with publiclyAccessible:true — public database endpoint?"
    patterns:
      - pattern-either:
          - pattern: "new rds.DatabaseInstance($A, $B, {..., publiclyAccessible: true, ...})"
          - pattern: "new rds.DatabaseCluster($A, $B, {..., publiclyAccessible: true, ...})"

  - id: waypoint-ts-cdk-secret-literal-env
    languages: [typescript]
    severity: ERROR
    message: >
      A credential-looking environment variable is set to a string literal in CDK
      (container/function env), hard-coding a secret into the template. Agent:
      confirm this is not a real credential; move it to Secrets Manager / SSM.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "environment={ ...PASSWORD/SECRET/TOKEN...: '<literal>' } — hard-coded credential in IaC?"
    patterns:
      - pattern-either:
          - pattern: "{..., DB_PASSWORD: \"...\", ...}"
          - pattern: "{..., PASSWORD: \"...\", ...}"
          - pattern: "{..., DB_SECRET: \"...\", ...}"
          - pattern: "{..., API_KEY: \"...\", ...}"
          - pattern: "{..., API_TOKEN: \"...\", ...}"
          - pattern: "{..., SECRET_KEY: \"...\", ...}"

  # -------------------------------------------------- DURABILITY / RETENTION
  - id: waypoint-ts-cdk-s3-no-versioning
    languages: [typescript]
    severity: WARNING
    message: >
      CDK S3 bucket created without `versioned: true`, so overwritten/deleted
      objects leave no history. Agent: for a point-in-time / audited data store,
      losing object history breaks reproducibility — enable versioning.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "S3 bucket with no versioned:true — object history lost, no rollback/audit trail?"
    patterns:
      - pattern: new s3.Bucket($A, $B, {...})
      - pattern-not: "new s3.Bucket($A, $B, {..., versioned: true, ...})"

  - id: waypoint-ts-cdk-destructive-removal-policy
    languages: [typescript]
    severity: WARNING
    message: >
      CDK data store uses `removalPolicy: RemovalPolicy.DESTROY`, so a stack
      delete/replace silently destroys the data. Agent: confirm this store holds
      no durable/audited data, or switch to RETAIN/SNAPSHOT.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "removalPolicy: RemovalPolicy.DESTROY on a data store — data lost on stack delete?"
    patterns:
      - pattern: "new $CTOR($A, $B, {..., removalPolicy: cdk.RemovalPolicy.DESTROY, ...})"
      - metavariable-pattern:
          metavariable: $CTOR
          patterns:
            - pattern-either:
                - pattern: s3.Bucket
                - pattern: rds.DatabaseInstance
                - pattern: rds.DatabaseCluster
                - pattern: dynamodb.Table
                - pattern: logs.LogGroup

  - id: waypoint-ts-cdk-log-retention-infinite
    languages: [typescript]
    severity: WARNING
    message: >
      CDK LogGroup created without an explicit `retention:`, defaulting to
      never-expire retention. Agent: confirm an intentional retention window for
      audit/cost — set a RetentionDays value.
    metadata:
      category: iac
      waypoint_axes: [security]
      waypoint_hypothesis: "LogGroup with no retention: prop — logs kept forever / no defined window?"
    patterns:
      - pattern: new logs.LogGroup($A, $B, {...})
      - pattern-not: "new logs.LogGroup($A, $B, {..., retention: $R, ...})"
