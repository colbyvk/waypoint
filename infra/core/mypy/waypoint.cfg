# Waypoint's own mypy config — deliberately minimal.
#
# detectors/run_all.sh passes this explicitly with `--config-file` so a SCANNED
# project's own mypy config (mypy.ini / setup.cfg / pyproject.toml) is never read.
# That matters for security: mypy IMPORTS (i.e. executes) any module named in a
# `[mypy] plugins = ...` line, so reading an untrusted project's config would run
# attacker-controlled code. Correctness flags (--warn-unreachable, --strict-equality,
# --warn-no-return, ...) are supplied on the command line by run_all.sh.
[mypy]
