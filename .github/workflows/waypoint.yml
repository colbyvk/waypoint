# ============================================================================
# Waypoint CI (spec §12)  —  deterministic, no AI, NO API KEY.
#
# Waypoint is a tool: this workflow just runs the command and publishes results.
# The agent that reviews the findings is whoever opens the PR (or you) — Waypoint
# itself never calls a model and never needs a secret.
#
#   scan — every PR and push. Deterministic, fast. Produces beacons, ranks +
#          suppresses, uploads SARIF to the Security tab. No key.
#
# An OPTIONAL headless-triage job (the ONLY thing that would use an API key) is
# included at the bottom, commented out, for the rare unattended pipeline with no
# agent present. You do not need it — leave it disabled unless you specifically
# want Waypoint to call a model on your behalf.
#
# WAYPOINT_TARGET picks what to scan. It defaults to the bundled sample monorepo
# so a fresh clone demonstrably produces beacons — CHANGE IT to your own source
# (e.g. "src services app"); samples/ is Waypoint's own test fixture.
# ============================================================================
name: waypoint
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  security-events: write     # upload SARIF to the Security tab

env:
  WAYPOINT_TARGET: samples/monorepo   # <-- change to your source paths

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }      # full history so gitleaks can scan it
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install detectors
        run: ./detectors/install.sh
        # add optional detectors: ./detectors/install.sh --brew --node samples/monorepo/react_app

      - name: Scan (detect → merge → rank)
        run: ./bin/waypoint "$WAYPOINT_TARGET"

      # Policy gate ("teeth"): fail the PR when beacons violate waypoint.config.yaml
      # `gate:` (e.g. a high-severity security finding). Opt-in — uncomment to
      # enforce. Tune the thresholds in waypoint.config.yaml before enabling.
      # - name: Policy gate
      #   run: ./bin/waypoint "$WAYPOINT_TARGET" --gate

      - name: Upload SARIF (native Security tab)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: reports/ranked.sarif, category: waypoint }

      - name: Archive run reports
        uses: actions/upload-artifact@v4
        if: always()
        with: { name: waypoint-reports, path: reports/ }

# ----------------------------------------------------------------------------
# OPTIONAL — headless triage (the ONLY part that uses an API key).
#
# You normally do NOT need this. When an agent (Claude Code, Cursor, …) or a
# person reviews the PR, they are the verifier — for free, no key. This job is
